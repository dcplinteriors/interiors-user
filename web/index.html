<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="OneView — raise and track material requests for your assigned projects, on site.">
  <meta name="theme-color" content="#F6F7F9">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="OneView">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>OneView</title>
  <link rel="manifest" href="manifest.json">

  <!-- Pre-Flutter splash: the brand lock-up on graphite, matching the in-app
       SplashScreen so there's no flash before the Flutter engine boots. -->
  <style>
    #splash {
      position: fixed;
      inset: 0;
      background: #0F1217;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2147483647;
      opacity: 1;
      transition: opacity 250ms ease-out;
    }
    #splash.hide { opacity: 0; }
    #splash img {
      width: min(72vw, 320px);
      height: auto;
    }
  </style>
</head>
<body>
  <!-- Shown immediately; removed once Flutter paints its (identical) splash. -->
  <div id="splash"><img src="branding/oneview_logo.png" alt="OneView"></div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('splash');
      if (!s) return;
      s.classList.add('hide');
      setTimeout(function () { s.remove(); }, 300);
    });
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
